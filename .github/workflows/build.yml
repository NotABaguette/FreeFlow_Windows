name: Build FreeFlow Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install Fyne cross-compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Download dependencies
        run: go mod download

      - name: Build for Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "1"
          CC: x86_64-w64-mingw32-gcc
        run: go build -o FreeFlow.exe -ldflags="-s -w -H windowsgui" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFlow-windows-amd64
          path: FreeFlow.exe

  build-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download dependencies
        run: go mod download

      - name: Build for Windows arm64
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: go build -o FreeFlow-arm64.exe -ldflags="-s -w -H windowsgui" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFlow-windows-arm64
          path: FreeFlow-arm64.exe
